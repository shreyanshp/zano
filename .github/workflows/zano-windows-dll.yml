name: Zano Windows DLL build

# Builds zano_wallet.dll for the Flutter desktop runner at
# bitcoin-portal/mobile-news (issue #574). Manual-trigger only:
# pulls Boost (~250MB) + OpenSSL via vcpkg; takes ~60-90 min on a
# clean Windows runner.

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: zano-windows-dll-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-zano-wallet-dll
    runs-on: windows-latest
    timeout-minutes: 180

    env:
      EVENT_NAME: ${{ github.event_name }}
      BOOST_VERSION: '1.82.0'

    steps:
      - name: Checkout (full history + submodules)
        uses: actions/checkout@v4
        with:
          # libmdbx (contrib/db/libmdbx) calls `git describe --tags
          # --long --dirty` during cmake configure — fetch-depth: 1
          # leaves no tags reachable and the configure step aborts
          # with "Please fetch tags". Full history fixes it.
          fetch-depth: 0
          # contrib/tor-connect, contrib/miniupnp, contrib/jwt-cpp,
          # contrib/bitcoin-secp256k1 are git submodules. Without
          # this flag, contrib/CMakeLists.txt's add_subdirectory
          # calls fail on missing dirs and configure aborts with
          # "set_property could not find TARGET libminiupnpc-static".
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Cache the entire vcpkg install so subsequent runs skip the
      # ~40 min boost+openssl compile. Key on the manifest hash so any
      # bump to the dep list invalidates cleanly.
      - name: Cache vcpkg install
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
            C:\vcpkg\buildtrees
          # Cache key bumped — pinned vcpkg to 2023.12.12 to get
          # Boost 1.83 (the last release where boost::asio::io_service
          # is still defined; 1.85+ removed it and Zano + epee depend
          # on the legacy API).
          key: zano-vcpkg-2023.12.12-x64-static-md-boost1.83-openssl-v3
          restore-keys: |
            zano-vcpkg-x64-static-md-

      - name: Set up Boost + OpenSSL via vcpkg
        # The earlier MarkusJx/install-boost@v2.4.5 path failed because
        # 7z refused ~600 Boost symlinks ("Dangerous link path was
        # ignored"). The SourceForge prebuilt installer redirected to
        # HTML rather than serving the .exe ("file is corrupted and
        # unreadable"). vcpkg compile-from-source is slower (~40 min
        # first run) but bulletproof, and the cache step above brings
        # subsequent runs down to ~5 min.
        id: deps
        shell: pwsh
        run: |
          # Pin vcpkg to release 2022.07.25 — that release's boost
          # port is 1.79, which ships `boost/asio/io_service.hpp` as
          # an actual header file. Newer vcpkg removes that header
          # even when keeping the io_service typedef.
          # Validate the pinned commit before reusing any vcpkg from
          # the runner image; if mismatched, wipe + reclone.
          $expectedTag = "2022.07.25"
          $needFresh = $true
          if (Test-Path C:\vcpkg\.git) {
            Push-Location C:\vcpkg
            $tagAtHead = (git describe --tags --exact-match 2>$null) -as [string]
            Pop-Location
            if ($tagAtHead -eq $expectedTag) { $needFresh = $false }
          }
          if ($needFresh) {
            if (Test-Path C:\vcpkg) { Remove-Item -Recurse -Force C:\vcpkg }
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
            Push-Location C:\vcpkg
            git checkout $expectedTag
            Pop-Location
            C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          # `boost` meta-package pulls all the header-only libs Zano
          # needs (uuid, multiprecision, asio, msm, ...) on top of the
          # compiled subset (system, filesystem, thread, ...). Cheaper
          # than enumerating every Boost dependency Zano touches.
          C:\vcpkg\vcpkg.exe install --triplet x64-windows-static-md `
            boost `
            openssl
          $installed = "C:/vcpkg/installed/x64-windows-static-md"
          "BOOST_ROOT=$installed" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append
          "BOOST_LIBRARYDIR=$installed/lib" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append
          "OPENSSL_ROOT_DIR=$installed" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append

      - name: Configure CMake
        env:
          BOOST_ROOT_OUT: ${{ steps.deps.outputs.BOOST_ROOT }}
          BOOST_LIBRARYDIR_OUT: ${{ steps.deps.outputs.BOOST_LIBRARYDIR }}
          OPENSSL_ROOT_DIR_OUT: ${{ steps.deps.outputs.OPENSSL_ROOT_DIR }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 -T host=x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_ZANO_WALLET_DLL=ON `
            -DBUILD_GUI=FALSE `
            -DBUILD_TESTS=FALSE `
            -DSTATIC=FALSE `
            -DBoost_USE_STATIC_LIBS=ON `
            -DBOOST_ROOT="$Env:BOOST_ROOT_OUT" `
            -DBOOST_LIBRARYDIR="$Env:BOOST_LIBRARYDIR_OUT" `
            -DOPENSSL_ROOT_DIR="$Env:OPENSSL_ROOT_DIR_OUT" `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md

      - name: Build zano_wallet target only
        shell: pwsh
        run: cmake --build build --config Release --target zano_wallet --parallel

      - name: Stage DLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          $dll = Get-ChildItem -Recurse build -Filter zano_wallet.dll | Select-Object -First 1
          $pdb = Get-ChildItem -Recurse build -Filter zano_wallet.pdb | Select-Object -First 1
          if ($dll) { Copy-Item $dll.FullName artifact/ -Force }
          if ($pdb) { Copy-Item $pdb.FullName artifact/ -Force }
          Get-ChildItem artifact

      - name: Upload artifact
        if: env.EVENT_NAME != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: zano_wallet-windows-x64
          path: artifact/*
          retention-days: 30

      - name: Attach to release
        if: env.EVENT_NAME == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifact/zano_wallet.dll
            artifact/zano_wallet.pdb
