name: Zano Windows DLL build

# Builds zano_wallet.dll for the Flutter desktop runner at
# bitcoin-portal/mobile-news (issue #574). Manual-trigger only:
# pulls Boost (~250MB) + OpenSSL via vcpkg; takes ~60-90 min on a
# clean Windows runner.

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: zano-windows-dll-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-zano-wallet-dll
    runs-on: windows-latest
    timeout-minutes: 180

    env:
      EVENT_NAME: ${{ github.event_name }}
      BOOST_VERSION: '1.82.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Boost (pre-built binaries from SourceForge)
        # MarkusJx/install-boost ships an archive whose 7z extraction
        # refuses ~600 symlinks ("Dangerous link path was ignored")
        # and exits with code 2 on Windows runners. Skip that and grab
        # the official MSVC-prebuilt installer from sourceforge — same
        # binaries Boost.org publishes for users, ~5-10 min total.
        id: boost
        shell: pwsh
        run: |
          $boostExe = "$Env:RUNNER_TEMP/boost.exe"
          $boostDir = "C:/local/boost_1_82_0"
          Invoke-WebRequest `
            -Uri "https://sourceforge.net/projects/boost/files/boost-binaries/1.82.0/boost_1_82_0-msvc-14.3-64.exe/download" `
            -OutFile $boostExe `
            -UseBasicParsing
          # Self-extracting installer; /SILENT runs unattended.
          Start-Process -Wait -FilePath $boostExe `
            -ArgumentList "/SILENT","/SUPPRESSMSGBOXES","/SP-","/DIR=$boostDir"
          # Sanity check: confirm the libs landed at the path the
          # CMake configure step will look for.
          if (-not (Test-Path "$boostDir/lib64-msvc-14.3")) {
            Write-Error "Boost lib64-msvc-14.3 missing at $boostDir"
            exit 1
          }
          "BOOST_ROOT=$boostDir" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append
          "BOOST_LIBRARYDIR=$boostDir/lib64-msvc-14.3" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append

      - name: Set up OpenSSL via vcpkg
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          C:\vcpkg\vcpkg.exe install openssl:x64-windows-static-md

      - name: Configure CMake
        env:
          BOOST_ROOT_OUT: ${{ steps.boost.outputs.BOOST_ROOT }}
          BOOST_LIBRARYDIR_OUT: ${{ steps.boost.outputs.BOOST_LIBRARYDIR }}
        shell: pwsh
        run: |
          $openssl = "C:/vcpkg/installed/x64-windows-static-md"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 -T host=x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_ZANO_WALLET_DLL=ON `
            -DBUILD_GUI=FALSE `
            -DBUILD_TESTS=FALSE `
            -DSTATIC=FALSE `
            -DBOOST_ROOT="$Env:BOOST_ROOT_OUT" `
            -DBOOST_LIBRARYDIR="$Env:BOOST_LIBRARYDIR_OUT" `
            -DOPENSSL_ROOT_DIR="$openssl"

      - name: Build zano_wallet target only
        shell: pwsh
        run: cmake --build build --config Release --target zano_wallet --parallel

      - name: Stage DLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          $dll = Get-ChildItem -Recurse build -Filter zano_wallet.dll | Select-Object -First 1
          $pdb = Get-ChildItem -Recurse build -Filter zano_wallet.pdb | Select-Object -First 1
          if ($dll) { Copy-Item $dll.FullName artifact/ -Force }
          if ($pdb) { Copy-Item $pdb.FullName artifact/ -Force }
          Get-ChildItem artifact

      - name: Upload artifact
        if: env.EVENT_NAME != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: zano_wallet-windows-x64
          path: artifact/*
          retention-days: 30

      - name: Attach to release
        if: env.EVENT_NAME == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifact/zano_wallet.dll
            artifact/zano_wallet.pdb
