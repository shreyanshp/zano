name: Zano Windows DLL build

# Builds zano_wallet.dll for the Flutter desktop runner at
# bitcoin-portal/mobile-news (issue #574). Manual-trigger only.
#
# Boost is built from source on first run (~25 min), cached for
# subsequent runs (~1 min restore). OpenSSL via Chocolatey (~30s).
# Sidesteps vcpkg entirely — vcpkg's msys2 / 7-zip / GitHub mirror
# URLs rot every few months; building Boost directly from
# archives.boost.io is the only stable path.

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: zano-windows-dll-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-zano-wallet-dll
    runs-on: windows-latest
    timeout-minutes: 180

    env:
      EVENT_NAME: ${{ github.event_name }}
      BOOST_VERSION: '1.84.0'
      BOOST_VERSION_UNDERSCORE: '1_84_0'
      BOOST_ROOT: 'C:/local/boost'
      OPENSSL_ROOT_DIR: 'C:/Program Files/OpenSSL-Win64'

    steps:
      - name: Checkout (full history + submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up OpenSSL (Strawberry Perl bundle, pre-installed on runner)
        # The GitHub-hosted Windows runner image ships Strawberry Perl
        # at C:\Strawberry\c which includes a pre-built OpenSSL we can
        # link against directly. This dodges the slproweb.com /
        # firedaemon-style URL rot that bites every Chocolatey-based
        # install path (the version-specific .exe URLs go 404 every
        # few months as old patch releases get pruled).
        # Falls back to Chocolatey if the runner image changes
        # (no version pin so we get whichever build is currently
        # live, not a stale .exe URL).
        shell: pwsh
        run: |
          $candidates = @(
            "C:/Program Files/OpenSSL-Win64",
            "C:/Program Files/OpenSSL",
            "C:/Strawberry/c"
          )
          $found = $null
          foreach ($c in $candidates) {
            if (Test-Path "$c/include/openssl/ssl.h") {
              $found = $c
              break
            }
          }
          if (-not $found) {
            Write-Host "No pre-installed OpenSSL found; falling back to Chocolatey (latest)."
            choco install openssl --no-progress -y
            foreach ($c in $candidates) {
              if (Test-Path "$c/include/openssl/ssl.h") {
                $found = $c
                break
              }
            }
          }
          if (-not $found) {
            Write-Error "OpenSSL not available on this runner image."
            exit 1
          }
          Write-Host "Using OpenSSL at: $found"
          # Override the env-default with the actually-resolved path.
          "OPENSSL_ROOT_DIR=$found" | Out-File -FilePath $Env:GITHUB_ENV -Append
          Get-ChildItem "$found/include/openssl" | Select-Object -First 5

      - name: Cache Boost build
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: ${{ env.BOOST_ROOT }}
          key: zano-boost-1.84.0-msvc14.3-x64-static-md-v1

      - name: Download + build Boost (only if cache miss)
        if: steps.cache-boost.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://archives.boost.io/release/$Env:BOOST_VERSION/source/boost_${Env:BOOST_VERSION_UNDERSCORE}.zip"
          $zip = "$Env:RUNNER_TEMP/boost.zip"
          $extracted = "$Env:RUNNER_TEMP/boost_${Env:BOOST_VERSION_UNDERSCORE}"
          Write-Host "Downloading Boost from $url"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $Env:RUNNER_TEMP -Force
          Push-Location $extracted
          .\bootstrap.bat
          # Build only the Boost libs Zano links against; saves ~30 min
          # vs --build-all-libs.
          .\b2.exe `
            --prefix="$Env:BOOST_ROOT" `
            --build-type=minimal `
            --with-system `
            --with-filesystem `
            --with-locale `
            --with-thread `
            --with-timer `
            --with-date_time `
            --with-chrono `
            --with-regex `
            --with-serialization `
            --with-atomic `
            --with-program_options `
            --with-log `
            link=static `
            runtime-link=shared `
            threading=multi `
            address-model=64 `
            architecture=x86 `
            toolset=msvc-14.3 `
            -j 4 `
            install
          Pop-Location
          # Sanity check
          if (-not (Test-Path "$Env:BOOST_ROOT\include\boost\version.hpp")) {
            Write-Error "Boost headers missing at $Env:BOOST_ROOT/include"
            exit 1
          }
          if (-not (Test-Path "$Env:BOOST_ROOT\lib")) {
            Write-Error "Boost libs missing at $Env:BOOST_ROOT/lib"
            exit 1
          }
          Get-ChildItem "$Env:BOOST_ROOT\lib" | Select-Object -First 10

      - name: Configure CMake
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 -T host=x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_ZANO_WALLET_DLL=ON `
            -DBUILD_GUI=FALSE `
            -DBUILD_TESTS=FALSE `
            -DSTATIC=FALSE `
            -DBoost_USE_STATIC_LIBS=ON `
            -DBOOST_ROOT="$Env:BOOST_ROOT" `
            -DBOOST_LIBRARYDIR="$Env:BOOST_ROOT/lib" `
            -DOPENSSL_ROOT_DIR="$Env:OPENSSL_ROOT_DIR"

      - name: Build zano_wallet target only
        shell: pwsh
        run: cmake --build build --config Release --target zano_wallet --parallel

      - name: Stage DLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          $dll = Get-ChildItem -Recurse build -Filter zano_wallet.dll | Select-Object -First 1
          $pdb = Get-ChildItem -Recurse build -Filter zano_wallet.pdb | Select-Object -First 1
          if (-not $dll) { Write-Error "zano_wallet.dll not found"; exit 1 }
          Copy-Item $dll.FullName artifact/ -Force
          if ($pdb) { Copy-Item $pdb.FullName artifact/ -Force }
          Get-ChildItem artifact

      - name: Upload artifact
        if: env.EVENT_NAME != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: zano_wallet-windows-x64
          path: artifact/*
          retention-days: 30

      - name: Attach to release
        if: env.EVENT_NAME == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifact/zano_wallet.dll
            artifact/zano_wallet.pdb
